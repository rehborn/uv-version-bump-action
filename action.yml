name: 'uv version bump'
author: Dominique Rehborn
description: 'Bump version with uv and git tag'
branding:
  icon: chevron-up
  color: blue


inputs:
  bump:
    description: Version Bump (major, minor, patch + alpha, beta, rc, post, and dev, ie "minor dev")
    required: false
    default: 'minor'
  github_token:
    description: GITHUB_TOKEN for updating pyproject.toml and uv.lock and pushing version as tag
    default: ${{ github.token }}
  branch:
    description: repository branch
    default: 'main'
  commit_message:
    description: 'git commit message'
    default: 'bump to version'
  commit_user:
    description: 'commit user'
    default: 'github-actions[bot]'
  commit_email:
    description: 'commit email'
    default: 'github-actions[bot]@users.noreply.github.com'
  remote_host:
    description: 'git remote host'
    default: 'github.com'
  tag_message:
    description: 'git tag message'
    default: 'version'
  tag_prefix:
    description: 'prefix for git tag'
    default: ''

outputs:
  VERSION:
    description: "VERSION"
    value: "${{ steps.version.outputs.VERSION }}"

runs:
  using: "composite"
  steps:
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Version Bump
      id: version
      shell: bash
      run: |
        OLD_VERSION=$(uv version --short)
        uv version $(for bump in ${{ inputs.bump }}; do echo -n "--bump $bump "; done)
        uv lock
        VERSION=$(uv version --short)
  
        git config --local user.name ${{ inputs.commit_user }}
        git config --local user.email ${{ inputs.commit_email }}
        git remote set-url origin https://git:${{ inputs.github_token }}@${{ inputs.remote_host }}/${{ github.repository }}
        
        git add pyproject.toml uv.lock
        git commit -m "${{ inputs.commit_message }} ${VERSION}"
        git push origin ${{ inputs.branch }}
  
        git tag -a ${{ inputs.tag_prefix }}${VERSION} -m "${{ inputs.tag_message }} ${VERSION}"
        git push origin tag ${{ inputs.tag_prefix }}${VERSION}
  
        echo "VERSION BUMP: ${OLD_VERSION} -> ${VERSION}"
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
